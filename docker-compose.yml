services:
  postgres:
    image: postgres:17
    ports:
      - 5400:5432
    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_pass
      POSTGRES_DB: my_db
    volumes:
      - my-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - 8000:8000
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      #
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_pass
      POSTGRES_DB: my_db

volumes:
  my-pgdata:
